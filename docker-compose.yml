services:
  fhir:
    image: hapiproject/hapi:v7.4.0
    container_name: critcom-hapi
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.reuse_cached_search_results_millis: "-1"
      hapi.fhir.allow_multiple_delete: "true"
      hapi.fhir.allow_external_references: "true"
      hapi.fhir.default_encoding: "JSON"
    volumes:
      - hapi-data:/data/hapi
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/fhir/metadata"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

volumes:
  hapi-data:
